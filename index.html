// ── Helpers ───────────────────────────────────────────────────────────────────
function mid(m) { return m.l + "-" + m.f; }
function fn(s) { return s ? (s.lastName||"") + ", " + (s.firstName||"") : ""; }
function scoreColor(sc, max) {
  var p = sc/max;
  return p >= .88 ? C.scoreGreen : p >= .6 ? "#000" : C.red;
}
function hColor(h) { return parseFloat(h)<=3 ? C.scoreGreen : parseFloat(h)<=7 ? C.gold : C.red; }
function calcStats(rs, max, pct) {
  if (!rs.length) return { avg:null, handicap:null, count:0, avgPct:null, avg50:null, avg50Pct:null };
  var avg = rs.reduce(function(s,x){return s+x.score;},0) / rs.length, f = pct/100;
  return {
    avg: avg.toFixed(1), handicap: Math.abs(max-avg).toFixed(1), count: rs.length,
    avgPct: (avg*f).toFixed(1), avg50: (avg*2).toFixed(1), avg50Pct: (avg*2*f).toFixed(1)
  };
}
function buildRbm(rounds) {
  var m = {};
  rounds.forEach(function(r){ if(!m[r.shooterId]) m[r.shooterId]=[]; m[r.shooterId].push(r); });
  return m;
}
function buildInit() {
  var shooters = MM.map(function(m){ return {id:mid(m), lastName:m.l, firstName:m.f}; });
  var d = { shooters:shooters };
  Object.keys(GAMES).forEach(function(g){
    var rounds = [];
    shooters.forEach(function(s){
      (SM[g][s.id]||[]).forEach(function(sc,i){
        rounds.push({id:s.id+"-"+g+i, shooterId:s.id, score:sc, date:"Prior season"});
      });
    });
    d[g] = { rounds:rounds };
  });
  return d;
}

// ── Small components ──────────────────────────────────────────────────────────
function InlineInput({shooterId, onCommit, rowBg, maxScore, authed}) {
  const [val, setVal] = useState("");
  const commit = useCallback(function(){
    var sc = parseInt(val);
    if (!isNaN(sc) && sc>=0 && sc<=maxScore) { onCommit(shooterId, sc); setVal(""); }
    else setVal("");
  }, [val, shooterId, onCommit, maxScore]);
  if (!authed) return (
    <td style={Object.assign({},TD,{textAlign:"center",background:rowBg,borderLeft:"2px solid #d4cfc4"})}>
      <span style={{color:"#ccc",fontSize:16}}>·</span>
    </td>
  );
  return (
    <td style={Object.assign({},TD,{textAlign:"center",background:rowBg,borderLeft:"2px solid #a8cba8",padding:"6px 8px"})}
      onClick={function(e){e.stopPropagation();}}>
      <input className="ii" type="number" min={0} max={maxScore} placeholder="—" value={val}
        onChange={function(e){setVal(e.target.value);}}
        onKeyDown={function(e){if(e.key==="Enter")commit();}}
        onBlur={commit}/>
    </td>
  );
}
function PctInput({value, onChange}) {
  const [v, setV] = useState(String(value));
  function commit(){ var n=parseInt(v); if(!isNaN(n)&&n>=1&&n<=100) onChange(n); else setV(String(value)); }
  return (
    <div style={{display:"flex",alignItems:"center",gap:3,justifyContent:"center"}}>
      <input className="pct-input" type="number" min={1} max={100} value={v}
        onChange={function(e){setV(e.target.value);}} onBlur={commit}
        onKeyDown={function(e){if(e.key==="Enter")commit();}}/>
      <span style={{color:"rgba(255,255,255,.5)",fontSize:10}}>%</span>
    </div>
  );
}

function Stat({label, value, highlight}) {
  return (

}

  const [authed,  setAuthed]  = useState(false);
  const [pwIn,    setPwIn]    = useState("");
  const [pwErr,   setPwErr]   = useState(false);
  const [showPw,  setShowPw]  = useState(false);

  // Load / save
  useEffect(function(){
    async function load(){
      try {
        var {data:res,error} = await db.from("scores").select("data").eq("id","gmgc-v1").single();
        if (!error&&res&&res.data&&res.data.shooters&&res.data.shooters.length){ setData(res.data); setLoaded(true); return; }
      } catch(e){}
      setData(buildInit()); setLoaded(true);
    }
    load();
  }, []);
  useEffect(function(){
    if (!loaded||!data) return;
    db.from("scores").update({data:data,updated_at:new Date().toISOString()}).eq("id","gmgc-v1").then(function(){});
  }, [data, loaded]);

  var gDef     = GAMES[game];
  var shooters = data ? data.shooters : [];
  var rounds   = data ? data[game].rounds : [];

  function sv(v)  { setView(v); setVk(function(k){return k+1;}); }
  function sg(g)  { setGame(g); setView("leaderboard"); setVk(function(k){return k+1;}); setSel(null); }
  function toast_(m) { setToast(m); setTimeout(function(){setToast(null);}, 2800); }
  function login()   { if(pwIn===PASSWORD){setAuthed(true);setPwErr(false);setPwIn("");sv("leaderboard");}else{setPwErr(true);setPwIn("");} }
  function upd(f)    { setData(function(p){return f(p);}); }

  var rbm = useMemo(function(){ return buildRbm(rounds); }, [rounds]);

  var ws = useMemo(function(){
    return shooters.map(function(s){
      var sr = rbm[s.id]||[];
      return Object.assign({}, s, calcStats(sr, gDef.maxScore, pct), {last10:sr.slice(-10)});
    });
  }, [shooters, rbm, gDef.maxScore, pct]);

  var lb = useMemo(function(){
    return ws.slice().sort(function(a,b){
      if (sort==="alpha") return (a.lastName||"").localeCompare(b.lastName||"");
      if (a.handicap===null && b.handicap===null) return (a.lastName||"").localeCompare(b.lastName||"");
      if (a.handicap===null) return 1; if (b.handicap===null) return -1;
      return parseFloat(a.handicap) - parseFloat(b.handicap);
    });
  }, [ws, sort]);

  var addShooter = useCallback(function(){
    var ln=lnIn.trim(), f=fnIn.trim();
    if (!ln||!f) { toast_("Please enter both names."); return; }
    var id = ln+"-"+f;
    if (shooters.find(function(s){return s.id===id;})) { toast_("Member already exists."); return; }
    upd(function(p){return Object.assign({},p,{shooters:p.shooters.concat([{id,lastName:ln,firstName:f}])});});
    setLnIn(""); setFnIn(""); toast_(ln+", "+f+" added."); sv("leaderboard");
  }, [lnIn, fnIn, shooters]);

  var logRound = useCallback(function(){
    var sc = parseInt(rSc);
    if (!rSid||isNaN(sc)||sc<0||sc>gDef.maxScore) { toast_("Select a member and enter a valid score."); return; }
    var date = new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
    upd(function(p){var g=p[game];return Object.assign({},p,{[game]:{rounds:g.rounds.concat([{id:Date.now().toString(),shooterId:rSid,score:sc,date}])}});});

  async function exportExcel() {

    var scoreAFill = { type:"pattern", pattern:"solid", fgColor:{argb:"FFFAF8F4"} };
    var scoreBFill = { type:"pattern", pattern:"solid", fgColor:{argb:"FFF5F2EC"} };
    var whiteThin  = { style:"thin", color:{argb:"FFFFFFFF"} };
    var grayThin   = { style:"thin", color:{argb:"FFECE9E0"} };

    function hdrCell(txt, fillOverride) {
      return { value:txt, style:{
        fill: fillOverride||greenFill,
        font: { bold:true, color:{argb:"FFFFFFFF"}, size:10 },

        border: { bottom:whiteThin }

    Object.keys(GAMES).forEach(function(g){
      var gd = GAMES[g];
      var rbm2 = buildRbm(data[g].rounds);

      }).sort(function(a,b){
        if (a.stats.handicap===null&&b.stats.handicap===null) return (a.s.lastName||"").localeCompare(b.s.lastName||"");
        if (a.stats.handicap===null) return 1; if (b.stats.handicap===null) return -1;
        return parseFloat(a.stats.handicap)-parseFloat(b.stats.handicap);
      });

      var ws = wb.addWorksheet(gd.label);

      // Column widths
      var cols = [
        {width:5},{width:24},{width:8},{width:11},{width:11},
        {width:6},{width:6},{width:6},{width:6},{width:6},{width:6},{width:6},{width:6},{width:6},{width:6},
        {width:11},{width:11},{width:11}
      ];
      if (gd.showAvg50) cols.push({width:11},{width:14});
      ws.columns = cols;

      // Header row
      var hdrs = [
        hdrCell("#"), hdrCell("Member"),
        hdrCell("Rounds", darkFill), hdrCell("Avg Score", darkFill), hdrCell("Handicap", darkFill),
        hdrCell("R10",darkerFill),hdrCell("R9",darkerFill),hdrCell("R8",darkerFill),hdrCell("R7",darkerFill),
        hdrCell("R6",darkerFill),hdrCell("R5",darkerFill),hdrCell("R4",darkerFill),hdrCell("R3",darkerFill),
        hdrCell("R2",darkerFill),        hdrCell("R1",darkerFill),
        hdrCell("Avg Score", darkFill),
        hdrCell(pct+"% Avg", darkFill),
      ];
      if (gd.showAvg50) { hdrs.push(hdrCell("Avg / 50", darkFill)); hdrs.push(hdrCell(pct+"% Avg / 50", darkFill)); }
      var hdrRow = ws.addRow(hdrs.map(function(h){return h.value;}));
      hdrRow.height = 20;
      hdrRow.eachCell(function(cell, ci){
        var h = hdrs[ci-1];
        cell.style = h.style;
        if (ci===2) cell.alignment = {horizontal:"left", vertical:"middle"};
      });

      // Data rows — score columns are F(6) through O(15), rank 1-indexed
      rows.forEach(function(r, ri){
        var isEven = ri%2===0;
        var rFill  = isEven ? rowAFill  : rowBFill;
        var sFill  = isEven ? statAFill : statBFill;
        var scFill = isEven ? scoreAFill: scoreBFill;
        var rowNum = ri+2; // 1-indexed, row 1 is header

        var scoreRange = "F"+rowNum+":O"+rowNum;
        var avgFormula  = "IFERROR(AVERAGEIF("+scoreRange+",\"<>\"),\"\")";
        var hcapFormula = "IFERROR(ABS("+gd.maxScore+"-AVERAGEIF("+scoreRange+",\"<>\")),\"\")";
        var pctFormula  = "IFERROR(AVERAGEIF("+scoreRange+",\"<>\")*"+(pct/100)+",\"\")";
        var avg50Formula= "IFERROR(AVERAGEIF("+scoreRange+",\"<>\")*2,\"\")";
        var avg50PctF   = "IFERROR(AVERAGEIF("+scoreRange+",\"<>\")*2*"+(pct/100)+",\"\")";
        var cntFormula  = "COUNTA("+scoreRange+")";

        var rowVals = [ri+1, fn(r.s), {formula:cntFormula}, {formula:avgFormula}, {formula:hcapFormula}];
        r.filled.forEach(function(v){ rowVals.push(v!==null?v:""); });
        rowVals.push({formula:avgFormula});
        rowVals.push({formula:pctFormula});        if (gd.showAvg50) { rowVals.push({formula:avg50Formula}); rowVals.push({formula:avg50PctF}); }

        var row = ws.addRow(rowVals);
        row.height = 18;

        row.eachCell({includeEmpty:true}, function(cell, ci){
          var isName   = ci===2;
          var isStat   = ci===3||ci===4||ci===5||ci>=16;
          var isScore  = ci>=6&&ci<=15;          cell.border  = { bottom: grayThin };
          cell.alignment = { horizontal: isName?"left":"center", vertical:"middle" };

          if (isName) {
            cell.fill = rFill;
            cell.font = { bold:true, color:{argb:"FF2C4A2E"}, size:11 };
          } else if (isStat) {
            cell.fill = sFill;
            cell.font = { size:11 };
            // Handicap color
            if (ci===5 && r.stats.handicap!==null) {
              var hv = parseFloat(r.stats.handicap);
              var hc = hv<=3?"FF2D6A4F":hv<=7?"FF8B7340":"FF8B2020";
              cell.font = { bold:true, color:{argb:hc}, size:11 };
            }
          } else if (isScore) {
            cell.fill = scFill;
            var v = r.filled[ci-6];
            if (v!==null&&v!==undefined&&v!=="") {
              var p = v/gd.maxScore;
              var sc = p>=.88?"FF2D6A4F":p>=.6?"FF000000":"FF8B2020";
              cell.font = { bold:true, color:{argb:sc}, size:11 };
            } else {
              cell.font = { color:{argb:"FFCCCCCC"}, size:16 };
              cell.value = "·";
            }
          } else {
            cell.fill = rFill;
            cell.font = { size:11 };
          }

          // Number format for stat/avg cells
          if (isStat||isScore) cell.numFmt = ci===3||ci===4||ci>=16?"0.0":"0";
        });
      });

      // Freeze top row
      ws.views = [{state:"frozen", ySplit:1}];
    });

    // Download
    var buf = await wb.xlsx.writeBuffer();
    var blob = new Blob([buf], {type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"});
    var url = URL.createObjectURL(blob);

    a.href = url; a.download = "GMGC_Shooting_"+dt+".xlsx"; a.click();
    URL.revokeObjectURL(url);
  }

        )}

        {/* LOG ROUND */}
        {view==="log-round" && authed && (
          <div className="fi" key={game+"-"+vk} style={{maxWidth:440}}>
            <SectionHeader title={"Log a Round — "+gDef.label}/>
            <div style={{background:C.bgCard,border:"1px solid "+C.border,borderRadius:6,padding:"28px",boxShadow:"0 2px 12px rgba(0,0,0,.06)"}}>
              <p style={{margin:"0 0 22px",color:C.textMuted,fontStyle:"italic",fontFamily:"Playfair Display,serif",fontSize:14}}>Enter a score out of {gDef.maxScore} for {gDef.label}.</p>
              <label style={LST}>Member</label>
              <select className="if" value={rSid} onChange={function(e){setRSid(e.target.value);}} style={Object.assign({},IST,{background:C.bg})}>
                <option value="">— Select a member —</option>
                {ws.slice().sort(function(a,b){return(a.lastName||"").localeCompare(b.lastName||"");}).map(function(s){return <option key={s.id} value={s.id}>{fn(s)}</option>;})}
              </select>
              <label style={Object.assign({},LST,{marginTop:14})}>Score (out of {gDef.maxScore})</label>
              <input className="if" type="number" min={0} max={gDef.maxScore} value={rSc} onChange={function(e){setRSc(e.target.value);}} placeholder={"e.g. "+Math.round(gDef.maxScore*.85)} style={IST}/>
              <button className="ab" onClick={logRound} style={{marginTop:18,width:"100%",padding:"12px",borderRadius:4,border:"none",background:C.green,color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer",letterSpacing:1,fontFamily:"Lato,sans-serif",textTransform:"uppercase"}}>Log Round</button>
            </div>
          </div>
        )}

        {/* PROFILE */}
        {view==="profile" && profSh && (
          <div className="fi" key={game+"-"+vk}>
            <button className="gb" onClick={function(){sv("leaderboard");}} style={{background:"none",border:"none",color:C.green,cursor:"pointer",fontSize:13,marginBottom:20,padding:0,fontFamily:"Lato,sans-serif"}}>&larr; Back to Leaderboard</button>
            <div style={{background:C.bgCard,border:"1px solid "+C.border,borderLeft:"4px solid "+C.green,borderRadius:6,padding:"24px 28px",marginBottom:28,boxShadow:"0 2px 12px rgba(0,0,0,.06)"}}>
              <div style={{fontSize:10,color:C.textMuted,letterSpacing:2.5,textTransform:"uppercase",marginBottom:4}}>Member Profile · {gDef.label}</div>
              <h2 style={{margin:"0 0 22px",fontSize:26,color:C.green,fontFamily:"Playfair Display,serif",fontWeight:700}}>{fn(profSh)}</h2>
              <div style={{display:"flex",gap:48,flexWrap:"wrap",borderTop:"1px solid "+C.border,paddingTop:18}}>
                <Stat label="Rounds Played" value={profStats.count}/>
                <Stat label="Average Score" value={profStats.avg||"—"}/>
                <Stat label="Handicap" value={profStats.handicap||"—"} highlight/>
              </div>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <SectionHeader title="Round History" small/>
              {authed && <button className="db" onClick={function(){delShooter(profSh.id);}} style={{background:"none",border:"1px solid "+C.red,color:C.red,borderRadius:4,padding:"6px 14px",cursor:"pointer",fontSize:12,fontFamily:"Lato,sans-serif"}}>Remove Member</button>}
            </div>
            {profRounds.length===0 ? (
              <p style={{color:C.textMuted,fontStyle:"italic"}}>No rounds logged yet for {gDef.label}.</p>
            ) : (
              <div style={{borderRadius:6,border:"1px solid "+C.border,overflow:"hidden"}}>
                <table style={{width:"100%",borderCollapse:"collapse"}}>
                  <thead>
                    <tr style={{background:C.tableHead}}>
                      <th style={Object.assign({},TH,{textAlign:"left",color:"#fff",fontFamily:"Playfair Display,serif"})}>Date</th>
                      <th style={Object.assign({},TH,{color:"#fff",fontFamily:"Playfair Display,serif"})}>Score</th>
                      <th style={Object.assign({},TH,{color:"#fff",fontFamily:"Playfair Display,serif"})}>Round Handicap</th>
                      {authed && <th style={Object.assign({},TH,{width:40})}></th>}
                    </tr>
                  </thead>
                  <tbody>
                    {profRounds.map(function(r,i){
                      return (
                        <tr key={r.id} className="rh" style={{background:i%2===0?C.rowA:C.rowB}}>
                          <td style={Object.assign({},TD,{color:C.textMuted,fontStyle:"italic"})}>{r.date}</td>
                          <td style={Object.assign({},TD,{textAlign:"center",color:scoreColor(r.score,gDef.maxScore),fontWeight:700,fontFamily:"Playfair Display,serif",fontSize:15})}>{r.score} / {gDef.maxScore}</td>
                          <td style={Object.assign({},TD,{textAlign:"center"})}>{gDef.maxScore-r.score}</td>
                          {authed && <td style={Object.assign({},TD,{textAlign:"center"})}>
                            <button className="db" onClick={function(id){return function(){delRound(id);};}(r.id)} style={{background:"none",border:"none",color:"#bbb",cursor:"pointer",fontSize:14}}>&#x2715;</button>
                          </td>}
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            )}
          </div>
        )}
      </div>

      {/* Footer */}
      <div style={{background:C.green,marginTop:60,padding:"24px"}}>
        <div style={{maxWidth:1100,margin:"0 auto",textAlign:"center"}}>
          <div style={{color:"rgba(255,255,255,.6)",fontSize:11,letterSpacing:2,textTransform:"uppercase",fontWeight:300}}>Gulph Mills Golf Club · Shooting Sports · King of Prussia, PA</div>
          <div style={{color:"rgba(255,255,255,.35)",fontSize:10,marginTop:6}}>200 Swedeland Road · (610) 828-0717</div>
        </div>
      </div>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
